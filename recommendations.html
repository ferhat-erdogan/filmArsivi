<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Film Arşivi | Öneriler</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body class="bg-[#080a0f] text-white font-['Outfit']">
    <header class="glass-header fixed top-0 w-full z-[1000] px-6 py-5 border-b border-white/5">
        <div class="max-w-xl mx-auto flex items-center gap-4">
            <a onclick="history.back()" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-white cursor-pointer flex-shrink-0">
                <i class="fa-solid fa-arrow-left text-sm"></i>
            </a>
            <div class="min-w-0 flex-1">
                <h1 class="text-[11px] font-black tracking-[3px] uppercase text-white/40">ÖNERİLEN YAPIMLAR</h1>
                <p id="subTitle" class="text-[13px] font-black text-white truncate"></p>
            </div>
            <a href="index.html" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-white/40 hover:text-[#7cfc00] hover:border-[#7cfc00]/30 transition-all flex-shrink-0">
                <i class="fa-solid fa-house text-sm"></i>
            </a>
        </div>
    </header>
    <main class="max-w-xl mx-auto pt-28 pb-24 px-4">
        <div id="recommendationGrid" class="movie-grid grid grid-cols-2 gap-4"></div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/core/supabase.js"></script>
    <script src="js/core/api.js"></script>
    <script src="js/services/archive.js"></script>
    <script src="js/pages/recommendations.js"></script>
</body>
</html>
